<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>下载统计页面</title>
    <style>
        body {
            max-width: 800px;
            margin: 50px auto;
            font-family: Arial, sans-serif;
            text-align: center;
            color: #333;
        }
        .tip {
            font-size: 16px;
            color: #666;
            margin-top: 20px;
        }
        .status {
            margin-top: 10px;
            font-size: 18px;
        }
        .success {
            color: #2ea44f;
        }
        .error {
            color: #d73a4a;
        }
    </style>
</head>
<body>
    <h1>下载统计已触发</h1>
    <div class="tip">统计信息正在记录，你可单独发起下载请求</div>
    <div id="status" class="status">正在记录访问信息...</div>

    <script>
        // 核心配置（已修复仓库名，仅需确认Token正确）
        const CONFIG = {
            // ✅ 正确的仓库API根地址（匹配你的ttool仓库）
            repoApiRoot: 'https://api.github.com/repos/decayedwood-Liu/ttool/contents/',
            // ✅ 你的Token（已保留，确认勾选repo权限）
            githubToken: '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',
            // 保留记录的天数
            keepDays: 3
        };

        // 工具函数1：获取当前日期（YYYY-MM-DD）
        function getCurrentDate() {
            const date = new Date();
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }

        // 工具函数2：获取N天前的日期
        function getDateBeforeNDays(n) {
            const date = new Date();
            date.setDate(date.getDate() - n);
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }

        // 工具函数3：获取用户IP（替换为更稳定的API，避免跨域）
        async function getUserIP() {
            try {
                // 替换为无跨域限制的IP API
                const res = await fetch('https://api.ipify.org?format=json', {
                    mode: 'cors', // 强制跨域
                    cache: 'no-cache'
                });
                const data = await res.json();
                return data.ip || '未知IP';
            } catch (err) {
                console.log('获取IP失败：', err);
                return '未知IP';
            }
        }

        // 工具函数4：获取文件SHA（增加容错）
        async function getFileSHA(filename) {
            try {
                const res = await fetch(`${CONFIG.repoApiRoot}${filename}`, {
                    headers: {
                        'Authorization': `token ${CONFIG.githubToken}`,
                        'Accept': 'application/vnd.github.v3+json' // 适配GitHub API版本
                    },
                    cache: 'no-cache'
                });
                if (res.status === 404) return null;
                const data = await res.json();
                return data.sha;
            } catch (err) {
                console.log('获取SHA失败：', err);
                return null;
            }
        }

        // 核心函数：记录统计日志（简化逻辑，减少出错点）
        async function recordAccessLog() {
            const currentDate = getCurrentDate();
            const logFilename = `download-log-${currentDate}.json`;
            const userIP = await getUserIP();
            const accessTime = new Date().toISOString();

            // 初始化日志数据
            let logData = { records: [] };
            try {
                // 读取现有日志（若无则跳过）
                const res = await fetch(`${CONFIG.repoApiRoot}${logFilename}`, {
                    headers: {
                        'Authorization': `token ${CONFIG.githubToken}`,
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    cache: 'no-cache'
                });
                if (res.ok) {
                    const fileData = await res.json();
                    logData = JSON.parse(atob(fileData.content));
                }
            } catch (err) {
                console.log('读取现有日志失败（首次创建）：', err);
            }

            // 添加新记录
            logData.records.push({ ip: userIP, accessTime: accessTime });

            // 上传日志（核心修复：适配API格式）
            try {
                const sha = await getFileSHA(logFilename);
                const res = await fetch(`${CONFIG.repoApiRoot}${logFilename}`, {
                    method: sha ? 'PUT' : 'POST',
                    headers: {
                        'Authorization': `token ${CONFIG.githubToken}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Record access log: ${currentDate}`,
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(logData, null, 2)))), // 修复中文/特殊字符编码
                        sha: sha,
                        branch: 'main' // 指定主分支
                    })
                });

                if (res.ok) {
                    document.getElementById('status').className = 'status success';
                    document.getElementById('status').textContent = '访问信息记录成功！';
                } else {
                    const errData = await res.json();
                    throw new Error(`API错误：${errData.message}`);
                }
            } catch (err) {
                console.log('记录日志失败：', err);
                document.getElementById('status').className = 'status error';
                document.getElementById('status').textContent = '访问信息记录失败（详情看控制台）！';
            }
        }

        // 简化清理旧日志（可选，减少出错点）
        async function cleanOldLogs() {
            try {
                const cutoffDate = getDateBeforeNDays(CONFIG.keepDays);
                const cutoffTimestamp = new Date(cutoffDate).getTime();

                const res = await fetch(CONFIG.repoApiRoot, {
                    headers: {
                        'Authorization': `token ${CONFIG.githubToken}`,
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    cache: 'no-cache'
                });
                const files = await res.json();

                for (const file of files) {
                    if (file.name.startsWith('download-log-') && file.name.endsWith('.json')) {
                        const fileDate = file.name.replace('download-log-', '').replace('.json', '');
                        const fileTimestamp = new Date(fileDate).getTime();
                        if (fileTimestamp < cutoffTimestamp) {
                            const sha = await getFileSHA(file.name);
                            if (sha) {
                                await fetch(`${CONFIG.repoApiRoot}${file.name}`, {
                                    method: 'DELETE',
                                    headers: {
                                        'Authorization': `token ${CONFIG.githubToken}`,
                                        'Accept': 'application/vnd.github.v3+json',
                                        'Content-Type': 'application/json'
                                    },
                                    body: JSON.stringify({
                                        message: `Delete old log: ${file.name}`,
                                        sha: sha,
                                        branch: 'main'
                                    })
                                });
                                console.log('已删除旧日志：', file.name);
                            }
                        }
                    }
                }
            } catch (err) {
                console.log('清理旧日志失败：', err);
            }
        }

        // 主流程：仅执行统计（移除下载逻辑）
        window.onload = async function() {
            await recordAccessLog();
            await cleanOldLogs();
        };
    </script>
</body>
</html>
