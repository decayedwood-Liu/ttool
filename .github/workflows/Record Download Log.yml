name: Record Download Log
on:
  # 触发方式：GET 请求带参数（前端调用）
  workflow_dispatch:
    inputs:
      ip:
        description: 'User IP Address'
        required: true
        type: string
      timestamp:
        description: 'Download Timestamp (Beijing Time)'
        required: true
        type: string

jobs:
  record-log:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整历史

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Record Download Log
        env:
          USER_IP: ${{ github.event.inputs.ip }}
          TIMESTAMP: ${{ github.event.inputs.timestamp }}
        run: |
          python - <<EOF
          import json
          import os
          from datetime import datetime

          # 1. 获取当日日期（北京时间）
          beijing_tz = datetime.now().astimezone()
          today = beijing_tz.strftime("%Y-%m-%d")
          log_file = f"download-log-{today}.json"

          # 2. 初始化/读取当日日志
          log_data = {"records": []}
          if os.path.exists(log_file):
              with open(log_file, "r", encoding="utf-8") as f:
                  log_data = json.load(f)

          # 3. 添加新记录（IP + 时间）
          new_record = {
              "ip": "${USER_IP}",
              "download_time": "${TIMESTAMP}"
          }
          log_data["records"].append(new_record)

          # 4. 保存日志文件
          with open(log_file, "w", encoding="utf-8") as f:
              json.dump(log_data, f, ensure_ascii=False, indent=2)

          # 5. 清理3天前的旧日志（可选）
          import glob
          from datetime import timedelta
          cutoff_date = (beijing_tz - timedelta(days=3)).strftime("%Y-%m-%d")
          cutoff_ts = datetime.strptime(cutoff_date, "%Y-%m-%d").timestamp()
          
          for file in glob.glob("download-log-*.json"):
              file_date = file.replace("download-log-", "").replace(".json", "")
              try:
                  file_ts = datetime.strptime(file_date, "%Y-%m-%d").timestamp()
                  if file_ts < cutoff_ts:
                      os.remove(file)
                      print(f"Deleted old log: {file}")
              except:
                  pass
          EOF

      - name: Commit and Push Log
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Record download log: $(date +%Y-%m-%d_%H:%M:%S)" || echo "No changes to commit"
          git push
        env:
          # Actions 自带的 Token，权限足够写入仓库
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
