on:
  schedule:
    # 每天凌晨 0 点运行（UTC+8）
    - cron: '0 16 * * *'
  workflow_dispatch:   # 支持手动触发

jobs:
  delete-old-releases-and-tags:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 需要写权限以删除 Release 和 Tag
    steps:
      - name: Delete old releases and their tags (keep latest 2 + special tag)
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // 获取所有 Releases（最新在前）
            const { data: releases } = await github.rest.repos.listReleases({
              owner,
              repo,
              per_page: 100   // 一次最多取 100 个，如需处理更多可增加分页逻辑
            });

            console.log(`Found ${releases.length} releases total.`);

            const KEEP = 2;                     // 保留最新几个 Release
            const SPECIAL_TAG = '20260320';     // 指定需要保留的 tag 名称

            if (releases.length === 0) {
              console.log('No releases to process.');
              return;
            }

            // 收集需要保留的 release id
            const keepReleaseIds = new Set();

            // 1. 保留最新的 KEEP 个
            const latestReleases = releases.slice(0, KEEP);
            for (const release of latestReleases) {
              keepReleaseIds.add(release.id);
              console.log(`Will keep release ${release.name || release.tag_name} (tag: ${release.tag_name}) as part of latest ${KEEP}`);
            }

            // 2. 检查特定 tag 是否需要额外保留
            const specialRelease = releases.find(r => r.tag_name === SPECIAL_TAG);
            if (specialRelease) {
              if (!keepReleaseIds.has(specialRelease.id)) {
                keepReleaseIds.add(specialRelease.id);
                console.log(`Will additionally keep release ${specialRelease.name || specialRelease.tag_name} (tag: ${SPECIAL_TAG}) as specified.`);
              } else {
                console.log(`Special tag ${SPECIAL_TAG} is already among the latest ${KEEP}, no need to add duplicate.`);
              }
            } else {
              console.log(`Special tag ${SPECIAL_TAG} not found in releases.`);
            }

            // 遍历所有 release，删除不在保留列表中的
            for (const release of releases) {
              if (keepReleaseIds.has(release.id)) {
                continue; // 跳过保留的 release
              }

              const releaseId = release.id;
              const tagName = release.tag_name;
              const releaseName = release.name || tagName;

              console.log(`\nProcessing release: ${releaseName} (id: ${releaseId})`);

              // 1. 删除 Release
              try {
                await github.rest.repos.deleteRelease({
                  owner,
                  repo,
                  release_id: releaseId
                });
                console.log(`✅ Deleted release ${releaseName}`);
              } catch (error) {
                console.error(`❌ Failed to delete release ${releaseName}:`, error.message);
                continue;
              }

              // 2. 删除对应的 Git 标签（如果存在）
              if (tagName) {
                try {
                  await github.rest.git.deleteRef({
                    owner,
                    repo,
                    ref: `tags/${tagName}`
                  });
                  console.log(`✅ Deleted tag ${tagName}`);
                } catch (error) {
                  console.log(`⚠️  Could not delete tag ${tagName}:`, error.message);
                }
              } else {
                console.log(`ℹ️  Release ${releaseName} has no associated tag, skipping tag deletion.`);
              }
            }

            console.log('\nCleanup finished.');
